    <script>
        // Images
        let assets = document.querySelectorAll(".brand_items>*:not(div)");
        assets.forEach(asset => {
            asset.onclick = _ => {

                asset.classList.toggle("active");

                assets.forEach(i => { if (i !== asset) i.classList.remove("active"); });

            }
        })

        document.addEventListener("click", e => {
            if (!Array(...assets).includes(e.target)) {
                assets.forEach(i => i.classList.remove("active"));
            }
        })
    </script>
